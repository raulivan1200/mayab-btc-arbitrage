name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mayab-arbitrage-linux-x86_64
          - os: macos-latest
            artifact: mayab-arbitrage-macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - run: cargo build -p mayab-arbitrage --release --locked
      - name: Package binary
        run: tar -C target/release -czf "${{ matrix.artifact }}.tar.gz" mayab-arbitrage
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
