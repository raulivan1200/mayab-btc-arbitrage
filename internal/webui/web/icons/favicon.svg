<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ganancia" x1="4" y1="28" x2="28" y2="4" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7931a">
        <animate attributeName="stop-color" values="#f7931a;#22c55e;#facc15;#f7931a" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <style>
    .aro{transform-origin:16px 16px;animation:pulso 1.8s ease-in-out infinite}
    .grafica{stroke-dasharray:29;animation:sube 2.4s ease-in-out infinite}
    .punta{transform-origin:26px 14px;animation:salta 2.4s ease-in-out infinite}
    @keyframes pulso{50%{opacity:.58;transform:scale(.94)}}
    @keyframes sube{0%,20%{stroke-dashoffset:29}55%,100%{stroke-dashoffset:0}}
    @keyframes salta{0%,42%{opacity:0;transform:scale(.25)}60%,100%{opacity:1;transform:scale(1)}}
    @media (prefers-reduced-motion:reduce){.aro,.grafica,.punta{animation:none}.grafica{stroke-dashoffset:0}}
  </style>
  <rect width="32" height="32" rx="8" fill="#071a12"/>
  <circle class="aro" cx="16" cy="16" r="12.5" fill="none" stroke="url(#ganancia)" stroke-width="1.5" opacity=".9"/>
  <circle cx="13.5" cy="16" r="7.4" fill="url(#ganancia)"/>
