services:
  mayab-btc-arbitrage:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MAX_OPERACION_BTC: "0.18"
      MIN_UTILIDAD_USD: "1.25"
      MIN_DIFERENCIAL_NETO_BPS: "0.65"
      DESLIZAMIENTO_BPS: "0.35"
      ENFRIAMIENTO_MS: "1400"
      RETIRO_AMORTIZADO_BPS: "0.12"
