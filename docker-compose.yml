services:
  mayab:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUDITORIA_DB_PATH=/data/mayab-auditoria.sqlite
      - RUST_LOG=info
    volumes:
      - mayab-data:/data
    healthcheck:
      test: curl -sf http://localhost:8080/healthz || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mayab-data:
